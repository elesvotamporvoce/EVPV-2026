name: Atualizar status de mandato

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"   # toda segunda, 09:00 UTC

jobs:
  mandato:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r ingest/requirements.txt
      - name: Atualizar mandatos
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ingest/update_mandato.py
